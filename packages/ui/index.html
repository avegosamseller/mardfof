<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Office</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #16213e; font-family: 'Segoe UI', sans-serif; }
        #phaser-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #ui-root > * { pointer-events: auto; }
    </style>
</head>
<body>
    <div id="phaser-container"></div>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
