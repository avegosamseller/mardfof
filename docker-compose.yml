version: '3.8'

services:
  # Ollama service - only needed when LLM_PROVIDER=ollama
  ollama:
    image: ollama/ollama:latest
    container_name: agent-office-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - ollama

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: agent-office-server
    ports:
      - "3000:3000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_BASE_URL=${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - PORT=3000
    volumes:
      - server_data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: agent-office-ui
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  ollama_data:
  server_data:
