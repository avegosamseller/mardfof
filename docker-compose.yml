version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agent-office-ollama
    # Port 11434 not exposed externally — only used internally by server container
    # If you already have Ollama running on the host, remove this service
    # and set OLLAMA_URL=http://host.docker.internal:11434 in server env
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: agent-office-server
    ports:
      - "4890:4890"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=hermes3:latest
      - PORT=4890
    depends_on:
      - ollama
    volumes:
      - server_data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: agent-office-ui
    ports:
      - "4891:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  ollama_data:
  server_data:
